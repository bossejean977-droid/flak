<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAK Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#5b8cff,#ff00ff,#2b0030);
}

.box{
width:320px;
padding:30px;
border-radius:20px;
background:rgba(70,0,80,0.9);
text-align:center;
color:white;
}

h1{
margin-bottom:10px;
}

p{
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#00e5ff;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="box">
<h1>FLAK</h1>
<p>Connexion</p>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="login()">Connexion</button>

</div>

<script>
function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(email === "" || password === ""){
alert("Veuillez remplir tous les champs");
return;
}

if(email === "admin@gmail.com" && password === "1234"){
alert("Connexion réussie !");
window.location.href = "https://google.com";
}
else{
alert("Email ou mot de passe incorrect");
}

}
</script>

</body>
</html>
