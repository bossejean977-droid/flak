<!DOCTYPE html>
<html>
<head>
  <title>FLAK</title>
  <style>
    body{
      background:black;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      background:linear-gradient(135deg,#00ffff,#ff00ff,#000);
    }
    .card{
      background:rgba(0,0,0,0.6);
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:300px;
    }
    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:10px;
    }
    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:cyan;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>FLAK</h1>
    <p>Flash Compte</p>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Mot de passe">
    <button>Connexion</button>
  </div>
</body>
</html>
